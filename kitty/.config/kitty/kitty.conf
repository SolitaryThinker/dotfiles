# kitty.conf — ported from urxvt (.Xresources)
# Goal: match the previous urxvt setup as closely as possible.

# --- Font ---------------------------------------------------------------
# urxvt: URxvt*font: xft:Inconsolata:size=13
font_family      Inconsolata
font_size        16.0
# Note: kitty always antialiases; hinting/subpixel come from your system
# freetype/fontconfig (your Xft.* settings still apply at that level).

# --- Scrollback ---------------------------------------------------------
# urxvt: URxvt*saveLines: 2000
scrollback_lines 2000

# --- Scrollbar ----------------------------------------------------------
# urxvt: URxvt*scrollBar: false  (kitty has no scrollbar — nothing to do)

# --- Window -------------------------------------------------------------
# Mirror urxvt's default internalBorder (~2px) of padding.
window_padding_width 2
# Don't show the "kitty" message / confirm on close of a single window.
confirm_os_window_close 0

# --- Paste --------------------------------------------------------------
# urxvt: URxvt.perl-ext-common: -confirm-paste  (disable paste confirmation)
# Keep URL quoting but drop the confirmation dialog.
paste_actions quote-urls-at-prompt

# --- Cursor -------------------------------------------------------------
# urxvt gruvbox didn't set cursorColor, so it used the foreground color.
cursor #fbf1c7

# --- Colors: gruvbox dark, HIGH CONTRAST --------------------------------
# Hard-contrast background (#1d2021) + brightest foreground (#fbf1c7),
# and normal text colors raised to gruvbox's bright palette for punch.
background #1d2021
foreground #fbf1c7

# black
color0  #282828
color8  #928374
# red
color1  #fb4934
color9  #fb4934
# green
color2  #b8bb26
color10 #b8bb26
# yellow
color3  #fabd2f
color11 #fabd2f
# blue
color4  #83a598
color12 #83a598
# magenta
color5  #d3869b
color13 #d3869b
# cyan
color6  #8ec07c
color14 #8ec07c
# white
color7  #ebdbb2
color15 #fbf1c7
